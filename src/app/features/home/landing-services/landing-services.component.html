<div id="services-section" class="py-8 mt-8 px-4 lg:px-8">
  <div class="max-w-screen-xl mx-auto">
  <div class="text-center mb-8">
    <h2
      class="text-4xl lg:text-6xl font-bold mb-3 text-white"
      i18n="@@home-services-title"
    >
      Expertise & Leistungen
    </h2>
    <p
      class="text-white-alpha-50 text-lg lg:text-xl"
      i18n="@@home-services-subtitle"
    >
      Fokussierte Lösungen für moderne Web-Herausforderungen.
    </p>
  </div>
  <div class="grid justify-content-center">
    @for (service of services; track service.title) {
      <div class="col-12 md:col-6 lg:col-3 p-3">
        <div
          class="glass-card p-4 h-full flex flex-column align-items-center text-center border-2 border-white-alpha-10"
        >
          <div
            class="w-4rem h-4rem border-circle flex align-items-center justify-content-center mb-4 bg-white-alpha-10"
          >
            <i [class]="service.icon" class="text-3xl text-white"></i>
          </div>
          <h3 class="text-2xl font-bold mb-3 text-white">
            {{ service.title }}
          </h3>
          <p class="text-white-alpha-60 line-height-3 m-0">
            {{ service.description }}
          </p>
        </div>
      </div>
    }
  </div>
</div>
</div>
